<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>versatile-ai · 静态报告中心</title>
<style>
  :root {
    --bg: #F9F9F6;
    --surface: #FFFFFF;
    --text: #18181B;
    --text-secondary: #71717A;
    --text-tertiary: #A1A1AA;
    --accent: #6D28D9;
    --accent-hover: #5B21B6;
    --accent-subtle: #F5F3FF;
    --border: #E6E6E2;
    --border-hover: #D0CFE8;
    --success: #059669;
    --warning: #D97706;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  a { color: inherit; text-decoration: none; }

  /* ── Header ── */
  .header {
    padding: 72px 48px 56px;
    position: relative;
    overflow: hidden;
  }

  .header-inner {
    max-width: 1060px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 48px;
    align-items: center;
  }

  .header-content {
    max-width: 560px;
  }

  .crumb {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: var(--text-tertiary);
    margin-bottom: 20px;
  }

  .crumb a {
    color: var(--accent);
    transition: color 0.15s;
  }

  .crumb a:hover { color: var(--accent-hover); }

  h1 {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -1.2px;
    line-height: 1.12;
    margin-bottom: 16px;
    color: var(--text);
  }

  .hero-desc {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  .hero-mark {
    width: 260px;
    height: 260px;
    flex-shrink: 0;
  }

  /* ── Stats ribbon ── */
  .stats-ribbon {
    max-width: 1060px;
    margin: 0 auto;
    padding: 0 48px 8px;
  }

  .stats-row {
    display: flex;
    gap: 48px;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    line-height: 1;
    font-feature-settings: "tnum";
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: 0.6px;
    margin-top: 4px;
  }

  /* ── Main ── */
  .main {
    max-width: 1060px;
    margin: 0 auto;
    padding: 32px 48px 48px;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: var(--text-tertiary);
    white-space: nowrap;
  }

  /* ── Repo cards ── */
  .repo-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .repo-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    padding: 26px 30px;
    transition: border-color 0.2s ease, border-left-color 0.2s ease, background 0.2s ease;
    position: relative;
  }

  .repo-card:hover {
    border-color: var(--border-hover);
    border-left-color: var(--accent);
    background: #FDFDFC;
  }

  .repo-card:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }

  .repo-card-inner {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
  }

  .repo-info { flex: 1; min-width: 0; }

  .repo-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.2px;
  }

  .repo-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  .repo-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-bottom: 14px;
  }

  .repo-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .tag {
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', Consolas, 'PingFang SC', monospace;
    color: var(--text-tertiary);
    background: #F3F3F0;
    padding: 3px 9px;
    letter-spacing: 0.2px;
  }

  .repo-stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .repo-stats b {
    color: var(--text);
    font-weight: 500;
  }

  .repo-cta {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-tertiary);
    white-space: nowrap;
    padding-top: 3px;
    transition: color 0.2s ease, gap 0.2s ease;
    letter-spacing: -0.1px;
  }

  .repo-card:hover .repo-cta {
    color: var(--accent);
    gap: 8px;
  }

  .repo-cta svg {
    width: 15px;
    height: 15px;
    transition: transform 0.2s ease;
  }

  .repo-card:hover .repo-cta svg {
    transform: translateX(2px);
  }

  /* ── Empty state ── */
  .empty {
    color: var(--text-tertiary);
    font-size: 14px;
    padding: 56px 0;
    text-align: center;
  }

  /* ── Footer ── */
  .footer {
    max-width: 1060px;
    margin: 0 auto;
    padding: 28px 48px 40px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-tertiary);
  }

  .footer a {
    color: var(--accent);
    transition: color 0.15s;
  }

  .footer a:hover { color: var(--accent-hover); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 48px 24px 40px; }

    .header-inner {
      grid-template-columns: 1fr;
      gap: 32px;
    }

    .hero-mark {
      width: 180px;
      height: 180px;
      order: -1;
    }

    h1 { font-size: 34px; letter-spacing: -0.8px; }

    .stats-ribbon { padding: 0 24px 8px; }

    .stats-row { gap: 32px; flex-wrap: wrap; }

    .stat-value { font-size: 24px; }

    .main { padding: 28px 24px 40px; }

    .repo-card { padding: 20px 22px; }

    .repo-card-inner {
      flex-direction: column;
      gap: 12px;
    }

    .repo-cta { padding-top: 0; }

    .footer {
      flex-direction: column;
      gap: 8px;
      padding: 24px 24px 36px;
      text-align: center;
    }
  }

  @media (max-width: 480px) {
    h1 { font-size: 28px; }
    .stats-row { gap: 24px; }
    .repo-stats { gap: 12px; flex-wrap: wrap; }
  }

  /* ── Accessibility ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-content">
      <div class="crumb"><a href="https://github.com/versatile-ai">versatile-ai</a> / report-hub</div>
      <h1>静态报告中心</h1>
      <p class="hero-desc">versatile-ai 各仓库的自包含 HTML 报告聚合入口。每个仓库在子目录下维护自己的导航与报告文件，顶层仅做仓库级索引，便于跨仓库检索与直链分享。</p>
    </div>
    <svg class="hero-mark" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="140" cy="140" r="125" stroke="#E6E6E2" stroke-width="0.8"/>
      <circle cx="140" cy="140" r="85" stroke="#E6E6E2" stroke-width="0.8"/>
      <circle cx="140" cy="140" r="45" stroke="#E6E6E2" stroke-width="0.8"/>
      <circle cx="140" cy="140" r="4.5" fill="#6D28D9" opacity="0.45"/>
      <line x1="140" y1="15" x2="140" y2="55" stroke="#E6E6E2" stroke-width="0.6"/>
      <line x1="140" y1="225" x2="140" y2="265" stroke="#E6E6E2" stroke-width="0.6"/>
      <line x1="15" y1="140" x2="55" y2="140" stroke="#E6E6E2" stroke-width="0.6"/>
      <line x1="225" y1="140" x2="265" y2="140" stroke="#E6E6E2" stroke-width="0.6"/>
      <!-- outer nodes -->
      <circle cx="140" cy="30" r="3" fill="#6D28D9" opacity="0.22"/>
      <circle cx="140" cy="250" r="3" fill="#6D28D9" opacity="0.22"/>
      <circle cx="30" cy="140" r="3" fill="#6D28D9" opacity="0.22"/>
      <circle cx="250" cy="140" r="3" fill="#6D28D9" opacity="0.22"/>
      <!-- diagonal nodes -->
      <circle cx="62" cy="62" r="2.5" fill="#6D28D9" opacity="0.18"/>
      <circle cx="218" cy="62" r="2.5" fill="#6D28D9" opacity="0.18"/>
      <circle cx="62" cy="218" r="2.5" fill="#6D28D9" opacity="0.18"/>
      <circle cx="218" cy="218" r="2.5" fill="#6D28D9" opacity="0.18"/>
    </svg>
  </div>
</div>

<div class="stats-ribbon">
  <div class="stats-row" id="stats"></div>
</div>

<div class="main">
  <div class="section-divider">
    <span class="section-label">仓库</span>
    <span class="section-line"></span>
  </div>
  <div class="repo-list" id="repos"></div>
  <div class="empty" id="empty" style="display:none">暂无已发布的仓库报告</div>
</div>

<div class="footer">
  <span>versatile-ai report-hub · 仓库级静态报告聚合</span>
  <a href="https://github.com/versatile-ai">GitHub</a>
</div>

<script>
const REPOS=[
  {id:"automodelgo",name:"AutoModelGo",path:"automodelgo/",gh:"https://github.com/versatile-ai/AutoModelGo",
   desc:"Ascend NPU 上的模型适配、推测解码、性能调优实验记录。每份报告是自包含 HTML，含性能数据、原理分析、代码改动位置与开发路径。",
   lastUpdate:"2026-07-19",reports:1,active:1,
   tags:["Ascend 910B3","DSpark","vllm-ascend","推测解码"],
   stats:[{label:"实验",value:"1"},{label:"报告",value:"1"},{label:"最近更新",value:"2026-07-19"}]}
];

function arrowSvg() {
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
}

function renderStats() {
  var r = REPOS.length;
  var rep = REPOS.reduce(function(s, r) { return s + r.reports; }, 0);
  var a = REPOS.reduce(function(s, r) { return s + r.active; }, 0);
  var u = REPOS.reduce(function(m, r) { return r.lastUpdate > m ? r.lastUpdate : m; }, "");
  document.getElementById("stats").innerHTML =
    '<div class="stat-item"><div class="stat-value">' + r + '</div><div class="stat-label">仓库</div></div>' +
    '<div class="stat-item"><div class="stat-value">' + a + '</div><div class="stat-label">活跃</div></div>' +
    '<div class="stat-item"><div class="stat-value">' + rep + '</div><div class="stat-label">报告</div></div>' +
    '<div class="stat-item"><div class="stat-value">' + u + '</div><div class="stat-label">最近更新</div></div>';
}

function renderRepos() {
  if (REPOS.length === 0) { document.getElementById("empty").style.display = "block"; return; }
  document.getElementById("repos").innerHTML = REPOS.map(function(r) {
    var tags = (r.tags || []).map(function(t) { return '<span class="tag">' + t + '</span>'; }).join("");
    var stats = (r.stats || []).map(function(s) { return '<span>' + s.label + ' <b>' + s.value + '</b></span>'; }).join('<span> &middot; </span>');
    return '<a class="repo-card" href="' + r.path + '">' +
      '<div class="repo-card-inner">' +
        '<div class="repo-info">' +
          '<div class="repo-name"><span class="repo-dot"></span>' + r.name + '</div>' +
          '<div class="repo-desc">' + r.desc + '</div>' +
          (tags ? '<div class="repo-tags">' + tags + '</div>' : '') +
          '<div class="repo-stats">' + stats + '</div>' +
        '</div>' +
        '<span class="repo-cta">进入仓库 ' + arrowSvg() + '</span>' +
      '</div>' +
    '</a>';
  }).join("");
}

renderStats();
renderRepos();
</script>

</body>
</html>
