<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- <仓库名> · 实验报告 --></title>
<style>
  /* ───────────────────────────────────────────────────────────
     浅态 token —— 入口/索引页统一浅色(design-guide §2 浅态列),原样保留勿改值。
     本文件是仓库级导航骨架:复制后填 EXPERIMENTS 数组与 header 文案即可。
     ─────────────────────────────────────────────────────────── */
  :root {
    --bg: #F9F9F6;
    --surface: #FFFFFF;
    --text: #18181B;
    --text-secondary: #71717A;
    --text-tertiary: #A1A1AA;
    --accent: #6D28D9;
    --accent-hover: #5B21B6;
    --accent-subtle: #F5F3FF;
    --border: #E6E6E2;
    --border-hover: #D0CFE8;
    --success: #059669;
    --success-bg: #ECFDF5;
    --warning: #D97706;
    --warning-bg: #FFFBEB;
    --info: #2563EB;
    --info-bg: #EFF6FF;
    --danger: #DC2626;
    --danger-bg: #FEF2F2;
    --muted-bg: #F3F3F0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  a { color: inherit; text-decoration: none; }

  /* ── Header ── */
  .header { padding: 56px 48px 48px; position: relative; }
  .header-inner {
    max-width: 1060px; margin: 0 auto;
    display: grid; grid-template-columns: 1fr auto; gap: 48px; align-items: center;
  }
  .header-content { max-width: 560px; }

  .crumb {
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--text-tertiary); margin-bottom: 20px;
    display: flex; align-items: center; gap: 6px;
  }
  .crumb a { color: var(--accent); transition: color 0.15s; }
  .crumb a:hover { color: var(--accent-hover); }
  .crumb-sep { color: var(--text-tertiary); user-select: none; }

  h1 {
    font-size: 40px; font-weight: 700; letter-spacing: -1px;
    line-height: 1.12; margin-bottom: 14px; color: var(--text);
  }
  .hero-desc { font-size: 15px; color: var(--text-secondary); line-height: 1.7; }
  .hero-mark { width: 220px; height: 220px; flex-shrink: 0; }

  /* ── Stats ── */
  .stats-ribbon { max-width: 1060px; margin: 0 auto; padding: 0 48px 8px; }
  .stats-row { display: flex; gap: 48px; }
  .stat-item { display: flex; flex-direction: column; }
  .stat-value {
    font-size: 28px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.5px; line-height: 1;
    font-feature-settings: "tnum"; font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
  }
  .stat-label { font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.6px; margin-top: 4px; }

  /* ── Main ── */
  .main { max-width: 1060px; margin: 0 auto; padding: 32px 48px 48px; }
  .section-divider { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--text-tertiary); white-space: nowrap;
  }

  /* ── Experiment cards ── */
  .exp-list { display: flex; flex-direction: column; gap: 20px; }
  .exp-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid transparent; padding: 26px 30px;
    transition: border-color 0.2s ease, border-left-color 0.2s ease;
  }
  .exp-card:hover { border-color: var(--border-hover); border-left-color: var(--accent); }
  .exp-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 20px; margin-bottom: 10px;
  }
  .exp-title-area { flex: 1; min-width: 0; }
  .exp-title { font-size: 17px; font-weight: 600; color: var(--text); letter-spacing: -0.2px; margin-bottom: 4px; }
  .exp-subtitle { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }

  /* ── Status badges ── */
  .badge {
    display: inline-block; padding: 3px 10px; font-size: 11px;
    font-weight: 600; letter-spacing: 0.3px; white-space: nowrap; flex-shrink: 0;
  }
  .b-active   { background: var(--success-bg); color: var(--success); }
  .b-done     { background: var(--info-bg);    color: var(--info); }
  .b-paused   { background: var(--warning-bg); color: var(--warning); }
  .b-archived { background: var(--muted-bg);   color: var(--text-tertiary); }

  /* ── Metrics ── */
  .metrics { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0; }
  .metric {
    display: flex; align-items: baseline; gap: 7px;
    background: #F9F9F6; padding: 5px 12px; border: 1px solid var(--border); font-size: 13px;
  }
  .metric-label { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.5px; }
  .metric-value {
    font-size: 14px; font-weight: 700;
    font-feature-settings: "tnum"; font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
  }
  .mv-good { color: var(--success); }
  .mv-warn { color: var(--warning); }
  .mv-bad  { color: var(--danger); }
  .mv-info { color: var(--info); }

  /* ── Tags ── */
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0; }
  .tag {
    font-size: 11px; font-family: 'SF Mono', 'Fira Code', Consolas, 'PingFang SC', monospace;
    color: var(--text-tertiary); background: var(--muted-bg); padding: 3px 9px; letter-spacing: 0.2px;
  }

  /* ── Meta row ── */
  .exp-meta { display: flex; gap: 16px; font-size: 12px; color: var(--text-tertiary); align-items: center; flex-wrap: wrap; margin-top: 12px; }
  .exp-meta b { color: var(--text); font-weight: 500; }
  .exp-meta-sep { color: var(--border); user-select: none; }

  /* ── Reports sub-list ── */
  .reports-section { margin-top: 18px; border-top: 1px dashed var(--border); padding-top: 14px; }
  .reports-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; color: var(--text-tertiary); margin-bottom: 8px; }
  .report-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; transition: background 0.15s ease;
    text-decoration: none; color: inherit; gap: 12px;
  }
  .report-item:hover { background: var(--accent-subtle); }
  .report-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .report-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
  .report-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--text-tertiary); }
  .report-item:hover .report-icon { color: var(--accent); }
  .report-icon svg { width: 16px; height: 16px; }
  .report-info { min-width: 0; }
  .report-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 1px; }
  .report-sub { font-size: 12px; color: var(--text-tertiary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .report-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .report-type { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.5px; border: 1px solid var(--border); padding: 2px 7px; }
  .report-date { font-size: 11px; color: var(--text-tertiary); font-family: 'SF Mono', 'Fira Code', Consolas, monospace; }
  .report-arrow { color: var(--text-tertiary); font-size: 14px; transition: color 0.15s ease, transform 0.15s ease; }
  .report-item:hover .report-arrow { color: var(--accent); transform: translateX(2px); }

  /* ── Empty / Footer ── */
  .empty { color: var(--text-tertiary); font-size: 14px; padding: 56px 0; text-align: center; }
  .footer {
    max-width: 1060px; margin: 0 auto; padding: 28px 48px 40px;
    border-top: 1px solid var(--border); display: flex; justify-content: space-between;
    align-items: center; font-size: 12px; color: var(--text-tertiary);
  }
  .footer a { color: var(--accent); transition: color 0.15s; }
  .footer a:hover { color: var(--accent-hover); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header { padding: 40px 24px 32px; }
    .header-inner { grid-template-columns: 1fr; gap: 24px; }
    .hero-mark { width: 140px; height: 140px; order: -1; }
    h1 { font-size: 30px; letter-spacing: -0.6px; }
    .stats-ribbon { padding: 0 24px 8px; }
    .stats-row { gap: 32px; flex-wrap: wrap; }
    .stat-value { font-size: 24px; }
    .main { padding: 24px 24px 40px; }
    .exp-card { padding: 20px 22px; }
    .exp-head { flex-direction: column; gap: 10px; }
    .report-item { padding: 10px 4px; }
    .report-sub { display: none; }
    .footer { flex-direction: column; gap: 8px; padding: 24px 24px 36px; text-align: center; }
  }
  @media (max-width: 480px) {
    h1 { font-size: 26px; }
    .report-right { gap: 8px; }
    .report-type { display: none; }
    .metrics { gap: 4px; }
    .metric { padding: 4px 8px; font-size: 12px; }
  }

  /* ── Accessibility ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-content">
      <div class="crumb">
        <a href="../index.html">versatile-ai</a>
        <span class="crumb-sep">/</span>
        <a href="<!-- 仓库 GitHub URL -->"><!-- 仓库名(显示) --></a>
        <span class="crumb-sep">/</span>
        <span>experiments</span>
      </div>
      <h1>实验报告</h1>
      <p class="hero-desc"><!-- 一句话描述本仓库实验范围与报告内容,15~40 字 --></p>
    </div>
    <svg class="hero-mark" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="20" y="20" width="180" height="180" stroke="#E6E6E2" stroke-width="0.8"/>
      <rect x="50" y="50" width="120" height="120" stroke="#E6E6E2" stroke-width="0.8"/>
      <rect x="80" y="80" width="60" height="60" stroke="#E6E6E2" stroke-width="0.8"/>
      <circle cx="110" cy="110" r="3.5" fill="#6D28D9" opacity="0.5"/>
      <line x1="50" y1="50" x2="170" y2="170" stroke="#E6E6E2" stroke-width="0.5" opacity="0.5"/>
      <line x1="170" y1="50" x2="50" y2="170" stroke="#E6E6E2" stroke-width="0.5" opacity="0.5"/>
    </svg>
  </div>
</div>

<div class="stats-ribbon">
  <div class="stats-row" id="stats"></div>
</div>

<div class="main">
  <div class="section-divider">
    <span class="section-label">实验</span>
    <span class="section-line"></span>
  </div>
  <div class="exp-list" id="experiments"></div>
  <div class="empty" id="empty" style="display:none">暂无已发布报告</div>
</div>

<div class="footer">
  <span><!-- 仓库名 --> Experiment Reports · GitHub Pages</span>
  <a href="<!-- 仓库 GitHub URL -->">GitHub</a>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// EXPERIMENTS —— 本仓库实验与报告的事实源。
// 顶层 index.html 的 REPOS 不复制这里的统计,避免双源漂移(CLAUDE.md 约定 5)。
//
// 字段说明:
//   id         实验 id(全小写连字符),同时是实验目录名与锚点 id
//   name       实验显示名
//   subtitle   一句话副标题
//   status     active / done / paused / archived
//   startDate  YYYY-MM-DD
//   lastUpdate YYYY-MM-DD(发布新报告时同步更新)
//   tags       技术标签数组
//   metrics    关键指标卡:[{label, value, tone:good|warn|info}]
//   reports    报告列表:[{title, subtitle, file, date, type}]
//              file 为相对本 index.html 的路径:<experiment>/YYYY-MM-DD-<type>.html
//              type: stage / final / weekly / diagnosis / design / retrospective
// ════════════════════════════════════════════════════════════════
const EXPERIMENTS=[
  // 示例(填充后删除本注释块):
  // {
  //   id:"<experiment>",name:"<显示名>",subtitle:"<副标题>",
  //   status:"active",startDate:"YYYY-MM-DD",lastUpdate:"YYYY-MM-DD",
  //   tags:["..."],
  //   metrics:[{label:"<标签>",value:"<值>",tone:"good"}],
  //   reports:[
  //     {title:"<报告标题>",subtitle:"<一句话摘要>",
  //      file:"<experiment>/YYYY-MM-DD-<type>.html",date:"YYYY-MM-DD",type:"stage"}
  //   ]
  // }
];

var STATUS_LABEL = {active:"进行中", done:"已完成", paused:"暂停", archived:"已归档"};
var STATUS_CLASS = {active:"b-active", done:"b-done", paused:"b-paused", archived:"b-archived"};
var TYPE_LABEL   = {stage:"阶段报告", final:"终报告", weekly:"周报", diagnosis:"诊断", design:"设计", retrospective:"复盘"};

function iconSvg(type) {
  var paths = {
    stage:         "M4 3h6v4h4V3h6v18H4V3zm2 2v14h12V5h-4v4H10V5H6z",
    final:         "M5 13l4 4L19 7",
    weekly:        "M8 2v2m8-2v2M3 6h18M5 4h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1z",
    diagnosis:     "M12 2a10 10 0 100 20 10 10 0 000-20zm0 6v4m0 4h.01",
    design:        "M3 3h7v7H3zm4 4V4m10-1h7v7h-7zm-4 11v-3m-3 3h7v-7h-7z",
    retrospective: "M21 12a9 9 0 11-6.219-8.56"
  };
  var d = paths[type] || paths.stage;
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="' + d + '"></path></svg>';
}

function renderStats() {
  var t = EXPERIMENTS.length;
  var a = EXPERIMENTS.filter(function(e) { return e.status === "active"; }).length;
  var r = EXPERIMENTS.reduce(function(s, e) { return s + e.reports.length; }, 0);
  var u = EXPERIMENTS.reduce(function(m, e) { return e.lastUpdate > m ? e.lastUpdate : m; }, "");
  document.getElementById("stats").innerHTML =
    '<div class="stat-item"><div class="stat-value">' + t + '</div><div class="stat-label">实验</div></div>' +
    '<div class="stat-item"><div class="stat-value">' + a + '</div><div class="stat-label">进行中</div></div>' +
    '<div class="stat-item"><div class="stat-value">' + r + '</div><div class="stat-label">已发布报告</div></div>' +
    '<div class="stat-item"><div class="stat-value">' + u + '</div><div class="stat-label">最近更新</div></div>';
}

function renderExperiments() {
  if (EXPERIMENTS.length === 0) { document.getElementById("empty").style.display = "block"; return; }
  document.getElementById("experiments").innerHTML = EXPERIMENTS.map(function(exp) {
    var reportsHtml = exp.reports.map(function(r) {
      return '<a class="report-item" href="' + r.file + '">' +
        '<div class="report-left">' +
          '<div class="report-icon">' + iconSvg(r.type) + '</div>' +
          '<div class="report-info">' +
            '<div class="report-title">' + r.title + '</div>' +
            '<div class="report-sub">' + r.subtitle + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="report-right">' +
          '<span class="report-type">' + (TYPE_LABEL[r.type] || r.type) + '</span>' +
          '<span class="report-date">' + r.date + '</span>' +
          '<span class="report-arrow">&rarr;</span>' +
        '</div>' +
      '</a>';
    }).join("");

    var metricsHtml = (exp.metrics || []).map(function(m) {
      return '<div class="metric"><span class="metric-label">' + m.label + '</span><span class="metric-value mv-' + (m.tone || "info") + '">' + m.value + '</span></div>';
    }).join("");

    var tagsHtml = (exp.tags || []).map(function(t) {
      return '<span class="tag">' + t + '</span>';
    }).join("");

    return '<div class="exp-card" id="' + exp.id + '">' +
      '<div class="exp-head">' +
        '<div class="exp-title-area">' +
          '<div class="exp-title">' + exp.name + '</div>' +
          '<div class="exp-subtitle">' + exp.subtitle + '</div>' +
        '</div>' +
        '<span class="badge ' + (STATUS_CLASS[exp.status] || "b-archived") + '">' + (STATUS_LABEL[exp.status] || exp.status) + '</span>' +
      '</div>' +
      (metricsHtml ? '<div class="metrics">' + metricsHtml + '</div>' : '') +
      (tagsHtml ? '<div class="tags">' + tagsHtml + '</div>' : '') +
      '<div class="exp-meta">' +
        '<span>开始 <b>' + exp.startDate + '</b></span>' +
        '<span class="exp-meta-sep">&middot;</span>' +
        '<span>更新 <b>' + exp.lastUpdate + '</b></span>' +
        '<span class="exp-meta-sep">&middot;</span>' +
        '<span>' + exp.reports.length + ' 份报告</span>' +
      '</div>' +
      '<div class="reports-section">' +
        '<div class="reports-label">报告文件</div>' +
        reportsHtml +
      '</div>' +
    '</div>';
  }).join("");
}

renderStats();
renderExperiments();
</script>

</body>
</html>
